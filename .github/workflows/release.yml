name: Build And Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: true
        default: '2.0.0'
      create_release:
        description: 'Create GitHub release'
        required: false
        default: 'true'
      prerelease:
        description: 'Mark release as pre-release'
        required: false
        default: 'true'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for git describe

    - name: Build static binary via Docker
      env:
        VERSION: ${{ github.event.inputs.version || '2.0.0' }}
      run: |
        docker build --build-arg VERSION="$VERSION" -t gnodid-build .
        mkdir -p build
        cid=$(docker create gnodid-build)
        docker cp "$cid":/usr/bin/gnodid build/gnodid-linux
        docker rm "$cid"
        ls -la build/
        file build/gnodid-linux
        echo "Verifying static linking..."
        file build/gnodid-linux | grep -q "statically linked"

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: gnodid-linux-${{ github.event.inputs.version || '2.0.0' }}
        path: build/gnodid-linux
        retention-days: 30

    - name: Show binary info
      run: |
        echo "Binary size:"
        ls -lh build/gnodid-linux
        echo "Binary version info:"
        ./build/gnodid-linux version

  release:
    needs: build
    if: github.event.inputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download binary artifact
      uses: actions/download-artifact@v4
      with:
        name: gnodid-linux-${{ github.event.inputs.version || '2.0.0' }}
        path: build/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version || '2.0.0' }}
        name: v${{ github.event.inputs.version || '2.0.0' }}
        target_commitish: ${{ github.sha }}
        body: |
          ## v${{ github.event.inputs.version || '2.0.0' }}

          ### Downloads
          - **Linux (x86_64)**: `gnodid-linux`

          ### Installation
          ```bash
          # Download and make executable
          chmod +x gnodid-linux

          # Move to your PATH
          sudo mv gnodid-linux /usr/local/bin/gnodid
          ```

          ### Version Info
          Built with Go 1.24
        draft: false
        prerelease: ${{ github.event.inputs.prerelease == 'true' }}
        files: build/gnodid-linux
        token: ${{ secrets.GITHUB_TOKEN }}
